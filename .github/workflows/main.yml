name: Windows RDP Debug Session

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Session duration in minutes (max 360)"
        required: false
        default: "60"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Create RDP user ───────────────────────────────────────────────────────
      - name: Create RDP user
        run: |
          net user rdpuser "${{ secrets.RDP_PASSWORD }}" /add
          net localgroup Administrators rdpuser /add
          net localgroup "Remote Desktop Users" rdpuser /add
        shell: powershell

      # ── Enable Remote Desktop ─────────────────────────────────────────────────
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0
        shell: powershell

      # ── Install cloudflared ───────────────────────────────────────────────────
      - name: Install cloudflared
        run: |
          $url  = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          $dest = "C:\cloudflared.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Write-Host "cloudflared downloaded."
        shell: powershell

      # ── Start Cloudflare TCP tunnel on port 3389 ──────────────────────────────
      # cloudflared tunnel --url tcp://localhost:3389
      # prints a line like:  INF +----------------------------+
      #                           |  https://xxxx.trycloudflare.com  |
      # We parse that URL, then the user connects via:
      #   cloudflared access tcp --hostname xxxx.trycloudflare.com --url localhost:PORT
      # on their LOCAL machine (no account needed on either side).
      - name: Start cloudflared tunnel & print connection info
        run: |
          $tempLog = "$env:TEMP\cf_tunnel.log"

          # Launch tunnel in background, merge stderr+stdout via cmd 2>&1
          $cmdLine = "C:\cloudflared.exe tunnel --url tcp://localhost:3389 > `"$tempLog`" 2>&1"
          Start-Process -NoNewWindow -FilePath "cmd.exe" -ArgumentList "/c", $cmdLine

          Write-Host "Waiting for tunnel URL..."
          $tunnelUrl = $null
          $waited    = 0

          while (-not $tunnelUrl -and $waited -lt 60) {
            Start-Sleep -Seconds 2
            $waited += 2

            if (Test-Path $tempLog) {
              $content = Get-Content $tempLog -Raw -ErrorAction SilentlyContinue
              # cloudflared prints the public URL like:
              #   https://something-something.trycloudflare.com
              if ($content -match "https://[a-z0-9\-]+\.trycloudflare\.com") {
                $tunnelUrl = $Matches[0]
              }
            }
          }

          if (-not $tunnelUrl) {
            Write-Host "=== Full cloudflared log ==="
            Get-Content $tempLog -ErrorAction SilentlyContinue
            throw "Could not get tunnel URL after 60s"
          }

          $hostname = $tunnelUrl -replace "https://", ""

          Write-Host ""
          Write-Host "================================================================="
          Write-Host "  RDP CONNECTION DETAILS  (via Cloudflare Tunnel)"
          Write-Host "================================================================="
          Write-Host "  Tunnel URL : $tunnelUrl"
          Write-Host "  Username   : rdpuser"
          Write-Host "  Password   : (your RDP_PASSWORD secret)"
          Write-Host "================================================================="
          Write-Host ""
          Write-Host "STEP 1 — Install cloudflared on YOUR machine (one-time):"
          Write-Host "  Windows : winget install Cloudflare.cloudflared"
          Write-Host "  macOS   : brew install cloudflared"
          Write-Host "  Linux   : https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/"
          Write-Host ""
          Write-Host "STEP 2 — Run this command in a terminal on YOUR machine:"
          Write-Host "  cloudflared access tcp --hostname $hostname --url localhost:13389"
          Write-Host ""
          Write-Host "STEP 3 — Open RDP client and connect to:"
          Write-Host "  Address  : localhost:13389"
          Write-Host "  Username : rdpuser"
          Write-Host "  Password : (your RDP_PASSWORD secret)"
          Write-Host ""
          Write-Host "Session will stay open for ${{ github.event.inputs.timeout_minutes }} minutes."
          Write-Host "Cancel this workflow run to end early."
        shell: powershell

      # ── Keep alive ────────────────────────────────────────────────────────────
      - name: Keep session alive
        run: |
          $seconds = [int]"${{ github.event.inputs.timeout_minutes }}" * 60
          Write-Host "Sleeping $seconds seconds. Cancel this run to disconnect early."
          Start-Sleep -Seconds $seconds
        shell: powershell
