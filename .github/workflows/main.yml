name: Windows RDP Debug Session

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Session duration in minutes (max 360)"
        required: false
        default: "60"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Create RDP user ───────────────────────────────────────────────────────
      - name: Create RDP user
        run: |
          $username = "rdpuser"
          $password = "${{ secrets.RDP_PASSWORD }}"
          net user $username $password /add
          net localgroup Administrators $username /add
          net localgroup "Remote Desktop Users" $username /add
        shell: powershell

      # ── Enable Remote Desktop ─────────────────────────────────────────────────
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0
        shell: powershell

      # ── Tunnel RDP via localhost.run ──────────────────────────────────────────
      - name: Start localhost.run tunnel & print connection info
        run: |
          $tempLog = "$env:TEMP\tunnel_all.log"

          $cmdLine = "ssh -o StrictHostKeyChecking=no " + `
                     "-o ServerAliveInterval=30 " + `
                     "-o ServerAliveCountMax=720 " + `
                     "-R 0:localhost:3389 " + `
                     "nokey@localhost.run > `"$tempLog`" 2>&1"

          Start-Process -NoNewWindow -FilePath "cmd.exe" -ArgumentList "/c", $cmdLine

          Write-Host "Waiting for tunnel to establish..."
          $address = $null
          $waited  = 0

          while (-not $address -and $waited -lt 60) {
            Start-Sleep -Seconds 2
            $waited += 2

            if (Test-Path $tempLog) {
              # Print log each iteration so we can see what's coming in
              $lines = Get-Content $tempLog -ErrorAction SilentlyContinue

              foreach ($line in $lines) {
                Write-Host "  [log] $line"

                # Match lines like:
                #   "Allocated port 12345 for remote forward to localhost:3389"
                # but ONLY when port is non-zero
                if ($line -match "Allocated port (\d+) for remote forward" -and [int]$Matches[1] -ne 0) {
                  $port    = $Matches[1]
                  $address = "localhost.run:$port"
                  break
                }

                # Fallback: some versions print a hostname like:
                #   "Connect to tcp://abc.localhost.run:12345"  or
                #   "forwarding TCP connections from tcp://abc.lhr.life:12345"
                if ($line -match "tcp://([^\s:]+):(\d+)") {
                  $host_ = $Matches[1]
                  $port  = $Matches[2]
                  $address = "${host_}:${port}"
                  break
                }
              }
            }
          }

          if (-not $address) {
            Write-Host "=== Full tunnel log ==="
            Get-Content $tempLog -ErrorAction SilentlyContinue
            throw "Could not determine tunnel address after 60s"
          }

          $parts = $address -split ":"
          $host_ = $parts[0]
          $port  = $parts[1]

          Write-Host ""
          Write-Host "============================================"
          Write-Host "  RDP CONNECTION DETAILS"
          Write-Host "============================================"
          Write-Host "  Address  : $address"
          Write-Host "  Username : rdpuser"
          Write-Host "  Password : (your RDP_PASSWORD secret)"
          Write-Host "============================================"
          Write-Host ""
          Write-Host "Connect with:"
          Write-Host "  Windows : mstsc /v:$address"
          Write-Host "  macOS   : Microsoft Remote Desktop -> Add PC -> $address"
          Write-Host "  Linux   : xfreerdp /v:$host_ /port:$port /u:rdpuser"
          Write-Host ""
          Write-Host "Session will stay open for ${{ github.event.inputs.timeout_minutes }} minutes."
          Write-Host "Cancel this workflow run to disconnect early."
        shell: powershell

      # ── Keep alive ────────────────────────────────────────────────────────────
      - name: Keep session alive
        run: |
          $seconds = [int]"${{ github.event.inputs.timeout_minutes }}" * 60
          Write-Host "Sleeping for $seconds seconds. Cancel the run to end early."
          Start-Sleep -Seconds $seconds
        shell: powershell
