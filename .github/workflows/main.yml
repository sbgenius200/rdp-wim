name: Windows Desktop via noVNC (Cloudflare Tunnel)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Set password for runner user
        run: |
          $username = $env:USERNAME
          Write-Host "Runner username: $username"
          net user $username "P@ssw0rd123!"
        shell: powershell

      - name: Install TightVNC Server
        run: |
          $url = "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi"
          $dest = "$env:TEMP\tightvnc.msi"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Start-Process msiexec.exe -ArgumentList "/i $dest /quiet /norestart ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_USEVNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=password123 SET_CONTROLINTERFACE=1 VALUE_OF_CONTROLINTERFACE=0" -Wait
          Start-Sleep -Seconds 5
          Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3
          $svc = Get-Service -Name "tvnserver"
          Write-Host "TightVNC status: $($svc.Status)"
          if ($svc.Status -ne "Running") { Write-Host "ERROR: TightVNC not running!"; exit 1 }
        shell: powershell

      - name: Install websockify via pip
        run: |
          python -m pip install websockify --quiet
          python -m websockify --version
        shell: powershell

      - name: Download noVNC
        run: |
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.4.0.zip" -OutFile "$env:TEMP\novnc.zip"
          Expand-Archive "$env:TEMP\novnc.zip" -DestinationPath "C:\"
          Rename-Item "C:\noVNC-1.4.0" "C:\noVNC"
          Write-Host "noVNC ready at C:\noVNC"
          Test-Path "C:\noVNC\vnc.html"
        shell: powershell

      - name: Start websockify + noVNC + cloudflared (all in one step)
        run: |
          # --- 1. Start websockify serving noVNC on port 6080 ---
          $ws = Start-Process python `
            -ArgumentList "-m websockify --web C:\noVNC 6080 localhost:5900" `
            -WindowStyle Hidden -PassThru
          Write-Host "websockify PID: $($ws.Id)"
          Start-Sleep -Seconds 6

          # Verify websockify is up
          $conn = Test-NetConnection localhost -Port 6080 -WarningAction SilentlyContinue
          if (-not $conn.TcpTestSucceeded) {
            Write-Host "ERROR: websockify not listening on port 6080"
            exit 1
          }
          Write-Host "websockify is UP on port 6080"

          # Quick HTTP check
          $r = Invoke-WebRequest "http://localhost:6080/vnc.html" -UseBasicParsing
          Write-Host "noVNC HTTP check: $($r.StatusCode)"

          # --- 2. Download cloudflared ---
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cloudflared.exe"

          # --- 3. Launch cloudflared, capture output to file ---
          $cfLog = "C:\cf.log"
          $cf = Start-Process "C:\cloudflared.exe" `
            -ArgumentList "tunnel --url http://localhost:6080 --no-autoupdate --logfile $cfLog --loglevel info" `
            -WindowStyle Hidden -PassThru
          Write-Host "cloudflared PID: $($cf.Id)"

          # --- 4. Wait for URL in log file ---
          $tunnelUrl = $null
          Write-Host "Waiting for tunnel URL..."
          for ($i = 0; $i -lt 40; $i++) {
            Start-Sleep -Seconds 3
            if (Test-Path $cfLog) {
              $content = Get-Content $cfLog -Raw -ErrorAction SilentlyContinue
              if ($content -match "https://[a-z0-9\-]+\.trycloudflare\.com") {
                $tunnelUrl = $Matches[0]
                break
              }
            }
          }

          if (-not $tunnelUrl) {
            Write-Host "=== cloudflared log ==="
            Get-Content $cfLog -ErrorAction SilentlyContinue
            Write-Host "ERROR: Could not get tunnel URL"
            exit 1
          }

          Write-Host ""
          Write-Host "==========================================="
          Write-Host " OPEN THIS IN YOUR BROWSER:"
          Write-Host ""
          Write-Host " $tunnelUrl/vnc.html?autoconnect=true&password=password123"
          Write-Host ""
          Write-Host "==========================================="

          # --- 5. Keep everything alive ---
          for ($i = 1; $i -le 54; $i++) {
            # Check both processes are still alive
            if ($ws.HasExited) { Write-Host "WARNING: websockify died! Restarting..."; $ws = Start-Process python -ArgumentList "-m websockify --web C:\noVNC 6080 localhost:5900" -WindowStyle Hidden -PassThru }
            if ($cf.HasExited) { Write-Host "WARNING: cloudflared died! Restarting..."; $cf = Start-Process "C:\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:6080 --no-autoupdate" -WindowStyle Hidden -PassThru }
            Write-Host "[$i/54] alive | ws:$(-not $ws.HasExited) cf:$(-not $cf.HasExited) | $(Get-Date -Format 'HH:mm:ss')"
            Start-Sleep -Seconds 60
          }
        shell: powershell
