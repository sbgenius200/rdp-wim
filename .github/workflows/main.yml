name: Windows RDP Debug Session

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Session duration in minutes (max 360)"
        required: false
        default: "60"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install your app dependencies here if needed ──────────────────────────
      # - name: Install dependencies
      #   run: npm install

      # ── Create RDP user ───────────────────────────────────────────────────────
      - name: Create RDP user
        run: |
          $username = "rdpuser"
          $password = "${{ secrets.RDP_PASSWORD }}"
          net user $username $password /add
          net localgroup Administrators $username /add
          net localgroup "Remote Desktop Users" $username /add
        shell: powershell

      # ── Enable Remote Desktop ─────────────────────────────────────────────────
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Disable Network Level Authentication so any RDP client connects easily
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0
        shell: powershell

      # ── Tunnel RDP via localhost.run (free, no account needed) ────────────────
      # localhost.run uses a plain SSH reverse tunnel — no binary to install,
      # OpenSSH client is already on every Windows runner.
      - name: Start localhost.run tunnel & print connection info
        run: |
          # Launch SSH tunnel in background; -R forwards remote random port → local 3389
          # StrictHostKeyChecking=no so it doesn't hang on host key prompt
          $sshArgs = @(
            "-o", "StrictHostKeyChecking=no",
            "-o", "ServerAliveInterval=30",
            "-o", "ServerAliveCountMax=10",
            "-R", "0:localhost:3389",
            "nokey@localhost.run",
            "--",
            "--output=json"
          )
          $proc = Start-Process -NoNewWindow -PassThru `
            -FilePath "ssh" `
            -ArgumentList $sshArgs `
            -RedirectStandardOutput "$env:TEMP\tunnel.log" `
            -RedirectStandardError  "$env:TEMP\tunnel_err.log"

          Write-Host "Waiting for tunnel to establish..."
          $address = $null
          $waited  = 0
          while (-not $address -and $waited -lt 30) {
            Start-Sleep -Seconds 2
            $waited += 2
            if (Test-Path "$env:TEMP\tunnel.log") {
              $lines = Get-Content "$env:TEMP\tunnel.log" -ErrorAction SilentlyContinue
              foreach ($line in $lines) {
                try {
                  $json = $line | ConvertFrom-Json -ErrorAction SilentlyContinue
                  if ($json.address) { $address = $json.address; break }
                } catch {}
              }
            }
          }

          if (-not $address) {
            Write-Host "--- tunnel log ---"
            Get-Content "$env:TEMP\tunnel.log"    -ErrorAction SilentlyContinue
            Get-Content "$env:TEMP\tunnel_err.log" -ErrorAction SilentlyContinue
            throw "Could not retrieve tunnel address after 30s"
          }

          # address is  hostname:port
          $parts = $address -split ":"
          $host_ = $parts[0]
          $port  = $parts[1]

          Write-Host ""
          Write-Host "============================================"
          Write-Host "  RDP CONNECTION DETAILS"
          Write-Host "============================================"
          Write-Host "  Address  : $address"
          Write-Host "  Username : rdpuser"
          Write-Host "  Password : (your RDP_PASSWORD secret)"
          Write-Host "============================================"
          Write-Host ""
          Write-Host "Connect with:"
          Write-Host "  Windows : mstsc /v:$address"
          Write-Host "  macOS   : Microsoft Remote Desktop -> Add PC -> $address"
          Write-Host "  Linux   : xfreerdp /v:$host_ /port:$port /u:rdpuser"
          Write-Host ""
          Write-Host "Session will stay open for ${{ github.event.inputs.timeout_minutes }} minutes."
          Write-Host "Cancel this workflow run to disconnect early."
        shell: powershell

      # ── Keep alive ────────────────────────────────────────────────────────────
      - name: Keep session alive
        run: |
          $seconds = [int]"${{ github.event.inputs.timeout_minutes }}" * 60
          Start-Sleep -Seconds $seconds
        shell: powershell
