name: Windows RDP Debug Session

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Session duration in minutes (max 360)"
        required: false
        default: "60"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install your app dependencies here if needed ──────────────────────────
      # - name: Install dependencies
      #   run: npm install

      # ── Create RDP user ───────────────────────────────────────────────────────
      - name: Create RDP user
        run: |
          $username = "rdpuser"
          $password = "${{ secrets.RDP_PASSWORD }}"
          net user $username $password /add
          net localgroup Administrators $username /add
          net localgroup "Remote Desktop Users" $username /add
        shell: powershell

      # ── Enable Remote Desktop ─────────────────────────────────────────────────
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0
        shell: powershell

      # ── Tunnel RDP via localhost.run ──────────────────────────────────────────
      # localhost.run outputs the assigned address to STDERR in plain text like:
      #   "1.lhr.life tunneled with tls termination, https://..."  (HTTP mode)
      # For raw TCP it prints: "Allocated port NNNNN for remote forward to localhost:3389"
      # We parse that line from stderr to extract the port, then build the address.
      - name: Start localhost.run tunnel & print connection info
        run: |
          # Merge stderr into stdout so we can capture everything in one file
          # ssh -R 0:localhost:3389  → let server pick a free port
          $tempLog = "$env:TEMP\tunnel_all.log"

          $proc = Start-Process -NoNewWindow -PassThru `
            -FilePath "ssh" `
            -ArgumentList @(
              "-o", "StrictHostKeyChecking=no",
              "-o", "ServerAliveInterval=30",
              "-o", "ServerAliveCountMax=720",
              "-R", "0:localhost:3389",
              "nokey@localhost.run"
            ) `
            -RedirectStandardOutput $tempLog `
            -RedirectStandardError  $tempLog

          Write-Host "Waiting for tunnel to establish..."
          $address = $null
          $waited  = 0

          while (-not $address -and $waited -lt 60) {
            Start-Sleep -Seconds 2
            $waited += 2

            if (Test-Path $tempLog) {
              $content = Get-Content $tempLog -Raw -ErrorAction SilentlyContinue
              # localhost.run TCP line looks like:
              #   Allocated port 12345 for remote forward to localhost:3389
              if ($content -match "Allocated port (\d+) for remote forward") {
                $port    = $Matches[1]
                $address = "localhost.run:$port"
              }
            }
          }

          if (-not $address) {
            Write-Host "=== Full tunnel log ==="
            Get-Content $tempLog -ErrorAction SilentlyContinue
            throw "Could not determine tunnel address after 60s"
          }

          $parts = $address -split ":"
          $host_ = $parts[0]
          $port  = $parts[1]

          Write-Host ""
          Write-Host "============================================"
          Write-Host "  RDP CONNECTION DETAILS"
          Write-Host "============================================"
          Write-Host "  Address  : $address"
          Write-Host "  Username : rdpuser"
          Write-Host "  Password : (your RDP_PASSWORD secret)"
          Write-Host "============================================"
          Write-Host ""
          Write-Host "Connect with:"
          Write-Host "  Windows : mstsc /v:$address"
          Write-Host "  macOS   : Microsoft Remote Desktop -> Add PC -> $address"
          Write-Host "  Linux   : xfreerdp /v:$host_ /port:$port /u:rdpuser"
          Write-Host ""
          Write-Host "Session will stay open for ${{ github.event.inputs.timeout_minutes }} minutes."
          Write-Host "Cancel this workflow run to disconnect early."
        shell: powershell

      # ── Keep alive ────────────────────────────────────────────────────────────
      - name: Keep session alive
        run: |
          $seconds = [int]"${{ github.event.inputs.timeout_minutes }}" * 60
          Write-Host "Sleeping for $seconds seconds. Cancel the run to end early."
          Start-Sleep -Seconds $seconds
        shell: powershell
