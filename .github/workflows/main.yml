name: Windows Desktop via noVNC

on:
  workflow_dispatch: # Manual trigger only

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 60 # Adjust as needed (max 360 for paid, 60 for free)

    steps:
      - name: Enable Remote Desktop (RDP)
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        shell: powershell

      - name: Set password for runner user
        run: |
          $username = $env:USERNAME
          Write-Host "Runner username: $username"
          net user $username "P@ssw0rd123!"
        shell: powershell

      - name: Install chocolatey packages (VNC server + ngrok)
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install -y ngrok
        shell: powershell

      - name: Install TightVNC Server
        run: |
          $url = "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi"
          $dest = "$env:TEMP\tightvnc.msi"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Start-Process msiexec.exe -ArgumentList "/i $dest /quiet /norestart ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_USEVNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=password123 SET_CONTROLINTERFACE=1 VALUE_OF_CONTROLINTERFACE=0" -Wait
        shell: powershell

      - name: Start TightVNC Server
        run: |
          Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
          # Give it a moment to initialize
          Start-Sleep -Seconds 3
          # Verify it's running
          Get-Service -Name "tvnserver" | Select-Object Status, Name
        shell: powershell

      - name: Download and setup noVNC
        run: |
          # Download noVNC
          $nvUrl = "https://github.com/novnc/noVNC/archive/refs/tags/v1.4.0.zip"
          $nvDest = "$env:TEMP\novnc.zip"
          Invoke-WebRequest -Uri $nvUrl -OutFile $nvDest
          Expand-Archive -Path $nvDest -DestinationPath "C:\novnc_extracted"
          Move-Item "C:\novnc_extracted\noVNC-1.4.0" "C:\noVNC"

          # Download websockify (Python-based websocket proxy for VNC)
          $wsUrl = "https://github.com/novnc/websockify/archive/refs/tags/v0.11.0.zip"
          $wsDest = "$env:TEMP\websockify.zip"
          Invoke-WebRequest -Uri $wsUrl -OutFile $wsDest
          Expand-Archive -Path $wsDest -DestinationPath "C:\websockify_extracted"
          Move-Item "C:\websockify_extracted\websockify-0.11.0" "C:\websockify"
        shell: powershell

      - name: Install Python dependencies for websockify
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          # websockify can run standalone via its run script
        shell: powershell

      - name: Start websockify (VNC WebSocket proxy)
        run: |
          # websockify bridges WebSocket (noVNC) <-> raw TCP (VNC on 5900)
          Start-Process python -ArgumentList "C:\websockify\run 6080 localhost:5900" -WindowStyle Hidden
          Start-Sleep -Seconds 3
          Write-Host "Websockify started on port 6080"
        shell: powershell

      - name: Expose noVNC via ngrok
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          # Configure ngrok auth token
          ngrok config add-authtoken $env:NGROK_AUTHTOKEN

          # Start ngrok tunnel on the websockify port
          Start-Process ngrok -ArgumentList "http 6080" -WindowStyle Hidden
          Start-Sleep -Seconds 5

          # Fetch the public URL from ngrok's local API
          $response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $url = $response.tunnels[0].public_url

          # Convert http -> https if needed (ngrok always provides https)
          Write-Host "==========================================="
          Write-Host "noVNC URL (open in browser):"
          Write-Host "$url/vnc.html?autoconnect=true&password=password123"
          Write-Host "==========================================="
        shell: powershell

      - name: Keep session alive
        run: |
          Write-Host "Session is live. Sleeping to keep the runner alive..."
          Write-Host "The workflow will auto-cancel after the timeout-minutes limit."
          # Sleep in chunks so logs stay active (GitHub cuts idle jobs)
          for ($i = 1; $i -le 55; $i++) {
            Write-Host "[$i/55] Still alive... $(Get-Date -Format 'HH:mm:ss')"
            Start-Sleep -Seconds 60
          }
        shell: powershell
