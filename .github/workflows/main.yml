name: Windows Desktop via noVNC (Cloudflare Tunnel)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Set password for runner user
        run: |
          $username = $env:USERNAME
          Write-Host "Runner username: $username"
          net user $username "P@ssw0rd123!"
        shell: powershell

      - name: Install TightVNC Server
        run: |
          $url = "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi"
          $dest = "$env:TEMP\tightvnc.msi"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Start-Process msiexec.exe -ArgumentList "/i $dest /quiet /norestart ADDLOCAL=Server SET_USEVNCAUTHENTICATION=1 VALUE_OF_USEVNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=password123 SET_CONTROLINTERFACE=1 VALUE_OF_CONTROLINTERFACE=0" -Wait
        shell: powershell

      - name: Start TightVNC Server
        run: |
          Start-Service -Name "tvnserver" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3
          Get-Service -Name "tvnserver" | Select-Object Status, Name
        shell: powershell

      - name: Download and setup noVNC
        run: |
          $nvUrl = "https://github.com/novnc/noVNC/archive/refs/tags/v1.4.0.zip"
          $nvDest = "$env:TEMP\novnc.zip"
          Invoke-WebRequest -Uri $nvUrl -OutFile $nvDest
          Expand-Archive -Path $nvDest -DestinationPath "C:\novnc_extracted"
          Move-Item "C:\novnc_extracted\noVNC-1.4.0" "C:\noVNC"

          $wsUrl = "https://github.com/novnc/websockify/archive/refs/tags/v0.11.0.zip"
          $wsDest = "$env:TEMP\websockify.zip"
          Invoke-WebRequest -Uri $wsUrl -OutFile $wsDest
          Expand-Archive -Path $wsDest -DestinationPath "C:\websockify_extracted"
          Move-Item "C:\websockify_extracted\websockify-0.11.0" "C:\websockify"
        shell: powershell

      - name: Install Python dependencies for websockify
        run: |
          python -m pip install --upgrade pip
          pip install numpy
        shell: powershell

      - name: Start websockify (VNC WebSocket proxy on port 6080)
        run: |
          Start-Process python -ArgumentList "C:\websockify\run 6080 localhost:5900" -WindowStyle Hidden
          Start-Sleep -Seconds 3
          Write-Host "Websockify started on port 6080"
        shell: powershell

      - name: Download and start cloudflared tunnel (no token needed)
        run: |
          # Download cloudflared binary directly — no account or token required
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "C:\cloudflared.exe"

          # Start a quick tunnel on port 6080 (noVNC websockify)
          # Output is written to a log file so we can parse the URL
          Start-Process -FilePath "C:\cloudflared.exe" `
            -ArgumentList "tunnel --url http://localhost:6080 --no-autoupdate" `
            -RedirectStandardError "C:\cf_tunnel.log" `
            -WindowStyle Hidden

          # Wait for the URL to appear in logs (cloudflared prints it to stderr)
          Write-Host "Waiting for Cloudflare tunnel URL..."
          $url = $null
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 2
            if (Test-Path "C:\cf_tunnel.log") {
              $log = Get-Content "C:\cf_tunnel.log" -Raw -ErrorAction SilentlyContinue
              if ($log -match "https://[a-z0-9\-]+\.trycloudflare\.com") {
                $url = $matches[0]
                break
              }
            }
          }

          if ($url) {
            Write-Host "==========================================="
            Write-Host "  Open this URL in your browser:"
            Write-Host ""
            Write-Host "  $url/vnc.html?autoconnect=true&password=password123"
            Write-Host ""
            Write-Host "==========================================="
          } else {
            Write-Host "Could not detect tunnel URL. Dumping log:"
            Get-Content "C:\cf_tunnel.log"
          }
        shell: powershell

      - name: Keep session alive
        run: |
          Write-Host "Session is live. Workflow keeps running until timeout."
          for ($i = 1; $i -le 55; $i++) {
            Write-Host "[$i/55] Still alive... $(Get-Date -Format 'HH:mm:ss')"
            Start-Sleep -Seconds 60
          }
        shell: powershell
